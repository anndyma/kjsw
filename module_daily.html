<script>
// =========================================================================
// 模块一：日常处理 (工作台、填制凭证、凭证管理)
// =========================================================================

// 强化全局辅助核算显示函数（携带类别信息）
window.getAuxName = function(id) {
    let x = auxItems.find(a => a.id == id);
    return x ? `[${x.category}] ${x.name}` : '';
};

// -------------------------------------------------------------------------
// 1. 工作台仪表盘 (Dashboard)
// -------------------------------------------------------------------------
window.pgDashboard = async function() {
    let sy = curBook.sysAccs || DEFAULT_SYS_ACCS, 
        ip = (sy.incPrefix || '').split(','), 
        ep = (sy.expPrefix || '').split(',');
        
    let oc = await window.calcTAcc(curPeriod, true, curPeriod, '已审核');
    let ic = 0, ex = 0;
    let allV = (await window.dbIdx('vouchers', 'bookId', curBook.id)).filter(v => v.period === curPeriod);
    let ct = allV.length;
    let unAuditCount = allV.filter(v => v.status === '未审核').length;
    
    for (let k in oc) {
        let o = oc[k];
        if (ip.some(x => x && o.code.startsWith(x))) ic += o.cre - o.deb;
        if (ep.some(x => x && o.code.startsWith(x))) ex += o.deb - o.cre;
    }
    
    let pf = ic - ex, mx = Math.max(Math.abs(ic), Math.abs(ex), Math.abs(pf), 1);
    let br = (l, v, c) => `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px"><div class="mono bold" style="color:${c};font-size:14px;">${window.fa(v)}</div><div style="width:50px;height:${Math.max(4, Math.abs(v) / mx * 140)}px;background:${c};border-radius:6px 6px 0 0;box-shadow:0 2px 8px ${c}40"></div><div class="text-xs color-m">${l}</div></div>`;
    
    window.ge('pageEl').innerHTML = `
        <div class="grid-4 mb-4">
            <div class="scard cursor-pointer" onclick="window.goMenu('voucher-add')" title="快捷填制凭证">
                <div class="text-sm color-m mb-2">💡 快捷操作</div>
                <div class="mono color-p" style="font-size:18px;margin-top:6px;font-weight:bold;">+ 填制新凭证</div>
            </div>
            <div class="scard">
                <div class="text-sm color-m mb-2">本期收入</div>
                <div class="mono color-p" style="font-size:22px;">${window.fa(ic)}</div>
            </div>
            <div class="scard">
                <div class="text-sm color-m mb-2">本期费用</div>
                <div class="mono color-d" style="font-size:22px;">${window.fa(ex)}</div>
            </div>
            <div class="scard cursor-pointer" onclick="window.goMenu('voucher-list')" title="点击前往凭证管理">
                <div class="flex-between mb-2">
                    <div class="text-sm color-m">本期凭证及利润</div>
                    ${unAuditCount > 0 ? `<span class="badge red">${unAuditCount} 待审</span>` : `<span class="badge green">全已审</span>`}
                </div>
                <div class="mono" style="font-size:22px;color:${pf >= 0 ? 'var(--success)' : 'var(--danger)'};">
                    <span class="text-sm color-main mr-2" style="color:#64748b;">${ct}张</span>${window.fa(pf)}
                </div>
            </div>
        </div>
        <div class="card">
            <div class="ctitle">收支趋势</div>
            <div style="display:flex;gap:30px;align-items:flex-end;height:200px;padding:10px 40px 0;">
                ${br('收入', ic, '#2563eb')}
                ${br('成本', ex, '#dc2626')}
                ${br('利润', pf, pf >= 0 ? '#16a34a' : '#dc2626')}
            </div>
        </div>`;
};

// -------------------------------------------------------------------------
// 2. 填制凭证 (Voucher Add)
// -------------------------------------------------------------------------
window.autoBalFC = function(i) {
    let td = 0, tc = 0;
    voucherEntries.forEach((e, x) => { if (x !== i) { td += +e.debit || 0; tc += +e.credit || 0; } });
    let e = voucherEntries[i], d = td - tc;
    if (Math.abs(d) > 0.001 && !(Math.abs(+e.debit || 0) > 0) && !(Math.abs(+e.credit || 0) > 0)) {
        if (d > 0) {
            e.credit = d.toFixed(2); e.debit = '';
            if (window.ge('vc'+i)) window.ge('vc'+i).value = e.credit;
            if (window.ge('vd'+i)) window.ge('vd'+i).value = '';
            window.amtChanged(i, 'c');
        } else {
            e.debit = Math.abs(d).toFixed(2); e.credit = '';
            if (window.ge('vd'+i)) window.ge('vd'+i).value = e.debit;
            if (window.ge('vc'+i)) window.ge('vc'+i).value = '';
            window.amtChanged(i, 'd');
        }
        return true;
    }
    return false;
};

window.discardVoucher = function() {
    editingVoucherId = null;
    window.pgVoucherAdd(true);
};

window.pgVoucherAdd = async function(forceClear = false) {
    // 跨页面暂存：初始化凭证草稿元数据
    if (typeof window.voucherDraftMeta === 'undefined') {
        window.voucherDraftMeta = { date: curPeriod + '-01', word: '记', attach: 0 };
    }

    if (editingVoucherId && window._loadEditVoucherId === editingVoucherId && !forceClear) {
        // [1] 从数据库中首次加载修改的凭证
        let v = await window.dbGet('vouchers', editingVoucherId);
        let es = await window.dbIdx('entries', 'voucherId', editingVoucherId);
        voucherEntries = es.map(e => {
            let a = accs.find(x => x.id == e.accId);
            let auxObj = e.auxId ? auxItems.find(x => x.id == e.auxId) : null;
            return {
                summary: e.summary || '', accId: e.accId, accSearch: a ? a.code + ' ' + a.name : '',
                auxCat: auxObj ? auxObj.category : '', auxId: e.auxId || '', cfItem: e.cfItem || '', currency: e.currency || '',
                fcAmount: e.fcAmount || '', excRate: e.excRate || '', qty: e.qty || '', price: e.price || '',
                debit: e.deb ? e.deb.toFixed(2) : '', credit: e.cre ? e.cre.toFixed(2) : '',
                isQty: a ? a.isQty : 0, unit: a ? a.unit : ''
            };
        });
        while (voucherEntries.length < 2) voucherEntries.push({ summary: '', accId: 0, accSearch: '', debit: '', credit: '', auxCat: '', auxId: '', cfItem: '', currency: '', fcAmount: '', excRate: '', qty: '', price: '', isQty: 0, unit: '' });
        let m = v.vno.match(/^([^\d\-]+)-(\d+)$/);
        window._loadEditVoucherId = null; // 消费加载标识
        
        window.voucherDraftMeta = { date: v.date, word: m ? m[1] : '记', attach: v.attach || 0 };
        window.renderVForm(m ? +m[2] : 1);
        
    } else if (editingVoucherId && !forceClear) {
        // [2] 继续编辑现有的草稿状态（跨页面返回时）
        let v = await window.dbGet('vouchers', editingVoucherId);
        let m = v ? v.vno.match(/^([^\d\-]+)-(\d+)$/) : null;
        window.renderVForm(m ? +m[2] : 1);
        
    } else {
        // [3] 新建凭证（检查是否有草稿或强制清空）
        let c = (await window.dbIdx('vouchers', 'bookId', curBook.id)).filter(v => v.period === curPeriod).length;
        let hasData = typeof voucherEntries !== 'undefined' && voucherEntries && voucherEntries.length > 0 && voucherEntries.some(e => e.accSearch || e.debit || e.credit || e.summary);

        if (forceClear || !hasData) {
            voucherEntries = [{}, {}].map(() => ({ summary: '', accId: 0, accSearch: '', debit: '', credit: '', auxCat: '', auxId: '', cfItem: '', currency: '', fcAmount: '', excRate: '', qty: '', price: '', isQty: 0, unit: '' }));
            window.voucherDraftMeta = { date: curPeriod + '-01', word: '记', attach: 0 };
        }
        window.renderVForm(c + 1);
    }
};

window.calcQty = function(i) {
    let e = voucherEntries[i], q = +e.qty, p = +e.price;
    if (q && p) {
        let amt = (q * p).toFixed(2), a = accs.find(x => x.id == e.accId);
        if (Math.abs(+e.credit || 0) > 0 || (a && a.direction === '贷' && !(Math.abs(+e.debit || 0) > 0))) {
            e.credit = amt; e.debit = '';
            if (window.ge('vc'+i)) window.ge('vc'+i).value = amt; if (window.ge('vd'+i)) window.ge('vd'+i).value = '';
        } else {
            e.debit = amt; e.credit = '';
            if (window.ge('vd'+i)) window.ge('vd'+i).value = amt; if (window.ge('vc'+i)) window.ge('vc'+i).value = '';
        }
        window.refreshVTotal();
        if (e.currency && +e.excRate) window.calcFc(i);
    } else if (q && (!p) && (Math.abs(+e.debit || 0) > 0 || Math.abs(+e.credit || 0) > 0)) {
        e.price = ((+e.debit || +e.credit) / q).toFixed(4).replace(/\.?0+$/, '');
        if (window.ge('vp'+i)) window.ge('vp'+i).value = e.price;
    }
};

window.calcFc = function(i) {
    let e = voucherEntries[i], f = +e.fcAmount, r = +e.excRate;
    if (f && r) {
        let l = (f * r).toFixed(2), a = accs.find(x => x.id == e.accId);
        if (Math.abs(+e.credit || 0) > 0 || (a && a.direction === '贷' && !(Math.abs(+e.debit || 0) > 0))) {
            e.credit = l; e.debit = '';
            if (window.ge('vc'+i)) window.ge('vc'+i).value = l; if (window.ge('vd'+i)) window.ge('vd'+i).value = '';
        } else {
            e.debit = l; e.credit = '';
            if (window.ge('vd'+i)) window.ge('vd'+i).value = l; if (window.ge('vc'+i)) window.ge('vc'+i).value = '';
        }
        window.refreshVTotal();
    }
};

window.amtChanged = function(i, t) {
    let e = voucherEntries[i];
    if (t === 'q') { window.calcQty(i); return; }
    let v = +e[t === 'd' ? 'debit' : 'credit'];
    if (Math.abs(v) > 0) {
        if (t === 'd') { e.credit = ''; if (window.ge('vc'+i)) window.ge('vc'+i).value = ''; }
        else { e.debit = ''; if (window.ge('vd'+i)) window.ge('vd'+i).value = ''; }
        
        if (e.qty) { e.price = (v / e.qty).toFixed(4).replace(/\.?0+$/, ''); if (window.ge('vp'+i)) window.ge('vp'+i).value = e.price; }
        if (e.excRate && e.currency) { e.fcAmount = (v / e.excRate).toFixed(2); if (window.ge('vf'+i)) window.ge('vf'+i).value = e.fcAmount; }
    }
    let codeM = e.accSearch.match(/^(\d+)/);
    if (codeM && window.isCashAcc(codeM[1]) && e.cfItem) {
        let isNowIn = +e.debit > 0, cfObj = CF_ITEMS.find(x => x.code === e.cfItem);
        if (cfObj && ((isNowIn && cfObj.type === 'out') || (!isNowIn && cfObj.type === 'in'))) {
            e.cfItem = '';
            let b = window.ge('cfbtn'+i);
            if (b) { b.className = 'btn btn-w text-xs w-full'; b.innerText = '⚠️ 必填: 选现金流'; }
        }
    }
    window.refreshVTotal();
};

window.vKey = function(e, i, t) {
    if (e.key === '=' && (t === 'd' || t === 'c')) { e.preventDefault(); window.autoBalFC(i); return; }
    if (e.key === ' ' && (t === 'd' || t === 'c')) {
        e.preventDefault();
        let d = voucherEntries[i].debit, c = voucherEntries[i].credit;
        voucherEntries[i].debit = c; voucherEntries[i].credit = d;
        if (window.ge('vd'+i)) window.ge('vd'+i).value = c || '';
        if (window.ge('vc'+i)) window.ge('vc'+i).value = d || '';
        window.amtChanged(i, t === 'd' ? 'c' : 'd');
        return;
    }

    if (t === 'a' && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
        let d = window.ge('vad'+i);
        if (d && !d.classList.contains('hidden')) {
            e.preventDefault();
            let items = Array.from(d.querySelectorAll('.accitem'));
            if (!items.length) return;
            let curIdx = items.findIndex(el => el.classList.contains('active'));
            items.forEach(el => el.classList.remove('active'));
            let newIdx = e.key === 'ArrowDown' ? curIdx + 1 : curIdx - 1;
            if (newIdx < 0) newIdx = items.length - 1;
            if (newIdx >= items.length) newIdx = 0;
            items[newIdx].classList.add('active');
            items[newIdx].scrollIntoView({block: 'nearest'});
            return;
        }
    }

    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        if (!['xCat', 'x'].includes(t)) {
            e.preventDefault();
            let step = e.key === 'ArrowDown' ? 1 : -1;
            let pf = {'s':'vs','a':'va','q':'vq','p':'vp','f':'vf','r':'vr','d':'vd','c':'vc'}[t];
            if (pf) {
                let targetEl = window.ge(pf + (i + step));
                if (targetEl && !targetEl.disabled) targetEl.focus();
            }
        }
        return;
    }

    let vd = voucherEntries;
    if (e.key === 'Enter') {
        e.preventDefault();
        if (t === 's') window.ge('va'+i)?.focus();
        else if (t === 'a') {
            let d = window.ge('vad'+i);
            if (d && !d.classList.contains('hidden')) {
                let f = d.querySelector('.active') || d.querySelector('.accitem');
                if (f) { window.pickAcc(i, +f.dataset.id, f.dataset.code, f.dataset.name, f.dataset.cur, f.dataset.hasq === 'true', f.dataset.unt); return; }
            }
            setTimeout(() => {
                let vxCat = window.ge('vxCat'+i);
                if (vxCat && !vxCat.disabled) { vxCat.focus(); return; }
                if (vd[i].isQty) window.ge('vq'+i)?.focus();
                else if (vd[i].currency) window.ge('vf'+i)?.focus();
                else (Math.abs(+vd[i].credit || 0) > 0 ? window.ge('vc'+i) : window.ge('vd'+i))?.focus();
            }, 10);
        }
        else if (t === 'xCat') { setTimeout(() => window.ge('vx'+i)?.focus(), 10); }
        else if (t === 'x') { setTimeout(() => { if (vd[i].isQty) window.ge('vq'+i)?.focus(); else if (vd[i].currency) window.ge('vf'+i)?.focus(); else (Math.abs(+vd[i].credit || 0) > 0 ? window.ge('vc'+i) : window.ge('vd'+i))?.focus(); }, 10); }
        else if (t === 'q') window.ge('vp'+i)?.focus();
        else if (t === 'p') { setTimeout(() => { if (vd[i].currency) window.ge('vf'+i)?.focus(); else (Math.abs(+vd[i].credit || 0) > 0 ? window.ge('vc'+i) : window.ge('vd'+i))?.focus(); }, 10); }
        else if (t === 'f') window.ge('vr'+i)?.focus();
        else if (t === 'r') (Math.abs(+vd[i].credit || 0) > 0 ? window.ge('vc'+i) : window.ge('vd'+i))?.focus();
        else if (t === 'd' || t === 'c') {
            if (!(Math.abs(+vd[i].debit || 0) > 0) && !(Math.abs(+vd[i].credit || 0) > 0)) window.autoBalFC(i);
            
            let codeM = vd[i].accSearch.match(/^(\d+)/);
            if (codeM && window.isCashAcc(codeM[1]) && (!vd[i].cfItem) && (Math.abs(+vd[i].debit || 0) > 0 || Math.abs(+vd[i].credit || 0) > 0)) { window.popupCF(i, true); return; }

            if (!(Math.abs(+vd[i].debit || 0) > 0) && !(Math.abs(+vd[i].credit || 0) > 0) && t === 'd') { window.ge('vc'+i)?.focus(); return; }
            if (i === vd.length - 1) { window.addVRow(); setTimeout(() => window.ge('vs'+(i+1))?.focus(), 50); } else window.ge('vs'+(i+1))?.focus();
        }
    }
};

window.popupCF = function(i, autoAdv) {
    let e = voucherEntries[i]; let codeM = e.accSearch.match(/^(\d+)/);
    if (!codeM || !window.isCashAcc(codeM[1])) return alert('非货币资金科目，无需配置现金流量项目！');
    if (!(Math.abs(+e.debit || 0) > 0) && !(Math.abs(+e.credit || 0) > 0)) return alert('请先输入借方或贷方金额，系统会自动判断现金流向！');
    
    let isIn = +e.debit > 0;
    let list = CF_ITEMS.filter(x => isIn ? x.type === 'in' : x.type === 'out');
    
    let curIdx = list.findIndex(x => x.code === e.cfItem);
    if (curIdx < 0) curIdx = 0;

    let html = list.map((x, idx) => `<div id="cfitem_${idx}" class="bitem cf-bitem ${idx===curIdx?'active':''}" onclick="window.setCFItem(${i}, '${x.code}', ${autoAdv?1:0})" style="cursor:pointer;padding:10px;border-bottom:1px solid #f1f5f9;font-size:13px;font-weight:bold;background:${idx===curIdx?'var(--primary-light)':'#fff'};transition:all 0.2s;">${idx+1}. [${x.code}] ${x.name}</div>`).join('');
    
    window.openDlg(isIn ? '选择 现金流入 项目 (借方)' : '选择 现金流出 项目 (贷方)', `<div class="alert alert-info">请使用 <b>⬆️ ⬇️ 上下方向键</b> 快速高亮选择，按 <b>Enter 回车键</b> 确认！</div><div id="cfListContainer" style="max-height:400px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;background:var(--bg-body);padding:8px;" data-idx="${curIdx}" data-max="${list.length-1}" data-row="${i}" data-adv="${autoAdv?1:0}">${html}</div>`);

    if (window._cfKeyHandler) document.removeEventListener('keydown', window._cfKeyHandler, true);
    window._cfKeyHandler = function(ev) {
        let container = window.ge('cfListContainer');
        if (!container || window.ge('dlgOverlay').classList.contains('hidden')) {
            document.removeEventListener('keydown', window._cfKeyHandler, true);
            return;
        }
        
        let idx = +container.dataset.idx;
        let max = +container.dataset.max;

        if (ev.key === 'ArrowUp') {
            ev.preventDefault();
            if (idx > 0) window.updateCFHighlight(idx - 1);
        } else if (ev.key === 'ArrowDown') {
            ev.preventDefault();
            if (idx < max) window.updateCFHighlight(idx + 1);
        } else if (ev.key === 'Enter') {
            ev.preventDefault();
            ev.stopPropagation(); 
            let selCode = list[+container.dataset.idx].code;
            window.setCFItem(+container.dataset.row, selCode, +container.dataset.adv === 1);
            document.removeEventListener('keydown', window._cfKeyHandler, true);
        }
    };
    document.addEventListener('keydown', window._cfKeyHandler, true);
    
    setTimeout(() => {
        let activeEl = window.ge('cfitem_' + curIdx);
        if (activeEl) activeEl.scrollIntoView({block: 'nearest'});
    }, 50);
};

window.updateCFHighlight = function(newIdx) {
    let container = window.ge('cfListContainer');
    if (!container) return;
    let oldIdx = +container.dataset.idx;
    let oldEl = window.ge('cfitem_' + oldIdx);
    let newEl = window.ge('cfitem_' + newIdx);
    
    if (oldEl) { oldEl.classList.remove('active'); oldEl.style.background = '#fff'; }
    if (newEl) { newEl.classList.add('active'); newEl.style.background = 'var(--primary-light)'; newEl.scrollIntoView({block: 'nearest'}); }
    
    container.dataset.idx = newIdx;
};

window.setCFItem = function(i, code, autoAdv) {
    voucherEntries[i].cfItem = code; window.closeDlg(); window.renderVForm(+window.qs('.vnum')?.textContent || 1);
    if (autoAdv) {
        if (i === voucherEntries.length - 1) { window.addVRow(); setTimeout(() => window.ge('vs'+(i+1))?.focus(), 50); } else window.ge('vs'+(i+1))?.focus();
    }
};

window.pickAcc = function(i, id, c, n, cur, hasQ, unt) {
    let e = voucherEntries[i];
    e.accId = id; e.accSearch = c + ' ' + n; e.currency = cur || ''; e.isQty = (hasQ === 'true' || hasQ === true); e.unit = unt || ''; e.qty = ''; e.price = '';
    e.auxCat = ''; e.auxId = ''; 
    if (cur) { let cx = currencies.find(x => x.code === cur); e.excRate = cx ? cx.rate : 1; e.fcAmount = ''; } else { e.excRate = ''; e.fcAmount = ''; }
    window.renderVForm(+window.qs('.vnum')?.textContent || 1);
    setTimeout(() => {
        window.autoBalFC(i);
        let vxCat = window.ge('vxCat'+i);
        if (vxCat && !vxCat.disabled) { vxCat.focus(); return; }
        else if (e.isQty) window.ge('vq'+i)?.focus();
        else if (e.currency) window.ge('vf'+i)?.focus();
        else (Math.abs(+e.credit || 0) > 0 ? window.ge('vc'+i) : window.ge('vd'+i))?.focus();
    }, 50);
};

window.renderVForm = function(num) {
    let dis = isClosed ? 'disabled' : '';
    let isE = !!editingVoucherId;
    
    let rs = voucherEntries.map((e, i) => {
        let acc = accs.find(x => x.id == e.accId);
        let auxCats = acc && acc.auxCategory ? acc.auxCategory.split(',') : [];
        let axHtml = '';
        if (auxCats.length > 0) {
            let catOpts = `<option value="">[1.选类别]</option>` + auxCats.map(c => `<option value="${c}" ${e.auxCat===c?'selected':''}>${c}</option>`).join('');
            let subItems = e.auxCat ? auxItems.filter(x => x.category === e.auxCat) : [];
            let subOpts = `<option value="">[2.选子目]</option>` + subItems.map(x => `<option value="${x.id}" ${e.auxId==x.id?'selected':''}>${window.esc(x.code+' '+x.name)}</option>`).join('');
            
            axHtml = `<div class="flex-row" style="gap:4px;">
                <select id="vxCat${i}" onchange="voucherEntries[${i}].auxCat=this.value; voucherEntries[${i}].auxId=''; window.renderVForm(+window.qs('.vnum')?.textContent || 1);" onkeydown="window.vKey(event,${i},'xCat')" class="v-inp" style="color:var(--primary);padding:4px 6px;border:1px solid #93c5fd;border-radius:4px;width:80px;font-size:11px;background:#eff6ff;" ${dis}>${catOpts}</select>
                <select id="vx${i}" onchange="voucherEntries[${i}].auxId=this.value" onkeydown="window.vKey(event,${i},'x')" class="v-inp f1" style="color:var(--text-main);padding:4px 6px;border:1px solid #cbd5e1;border-radius:4px;font-size:11px;" ${dis}>${subOpts}</select>
            </div>`;
        } else {
            axHtml = `<div class="tc text-xs color-m" style="padding:6px;background:#f8fafc;border-radius:4px;border:1px dashed #cbd5e1;user-select:none;">无需辅助</div>`;
        }

window.addVRow = function() {
    voucherEntries.push({summary:voucherEntries[voucherEntries.length-1]?.summary||'',accId:0,accSearch:'',debit:'',credit:'',auxCat:'',auxId:'',cfItem:'',currency:'',fcAmount:'',excRate:'',qty:'',price:'',isQty:!1,unit:''});
    window.renderVForm(+window.qs('.vnum')?.textContent || 1);
};

window.removeVRow = function(i) {
    if (voucherEntries.length > 2) { voucherEntries.splice(i, 1); window.renderVForm(+window.qs('.vnum')?.textContent || 1); }
};

window.refreshVTotal = function() {
    let td = voucherEntries.reduce((s, e) => s + (+e.debit || 0), 0);
    let tc = voucherEntries.reduce((s, e) => s + (+e.credit || 0), 0);
    let b = Math.abs(td - tc) < 0.001 && Math.abs(td) > 0.001;
    if (window.ge('vTotD')) window.ge('vTotD').textContent = window.fa(td);
    if (window.ge('vTotC')) window.ge('vTotC').textContent = window.fa(tc);
    
    let vb = window.ge('vBalBar'), vm = window.ge('vBalMsg');
    if (vb && vm) {
        vb.style.background = b ? 'var(--success-light)' : 'var(--danger-light)';
        vb.style.borderColor = b ? '#bbf7d0' : '#fecaca';
        vm.style.color = b ? 'var(--success)' : 'var(--danger)';
        vm.textContent = b ? '✓ 借贷平衡，可保存' : '✗ 借贷不平或为空';
    }
    return b;
};

window.showAccDrop = function(i) {
    let k = (voucherEntries[i].accSearch || '').toLowerCase();
    let l = accs.filter(a => window.isLeafAcc(a.code));
    let f = k ? l.filter(a => a.code.includes(k) || a.name.includes(k) || window.getAccPath(a.code).includes(k)).slice(0, 30) : l.slice(0, 30);
    let el = window.ge('vad'+i);
    if (el) {
        el.innerHTML = f.length ? f.map((a, x) => `<div class="accitem ${x===0?'active':''}" onmousedown="window.pickAcc(${i},${a.id},'${window.esc(a.code)}','${window.esc(window.getAccPath(a.code))}','${window.esc(a.currency||'')}','${a.isQty?'true':'false'}','${window.esc(a.unit||'')}')" data-id="${a.id}" data-code="${window.esc(a.code)}" data-name="${window.esc(window.getAccPath(a.code))}" data-cur="${window.esc(a.currency||'')}" data-hasq="${a.isQty?'true':'false'}" data-unt="${window.esc(a.unit||'')}"><span class="trunc"><span class="bold color-p" style="margin-right:6px">${a.code}</span>${window.esc(window.getAccPath(a.code))} ${a.currency?`<span class="badge purple">${window.esc(a.currency)}</span>`:''} ${a.isQty?`<span class="badge blue">量:${window.esc(a.unit||'')}</span>`:''} ${a.auxCategory?`<span class="badge orange">辅</span>`:''}</span><span class="text-xs color-m">${a.direction}</span></div>`).join('') : '<div class="tc text-xs color-m p-2">无匹配项</div>';
        el.classList.remove('hidden');
    }
};

window.hideAccDrop = function(i) { setTimeout(() => window.ge('vad'+i)?.classList.add('hidden'), 200); };

window.saveVoucher = async function() {
    // 【增强修复】：智能匹配用户直接输入内容但没有点击下拉框时的科目ID
    for (let e of voucherEntries) {
        if (!e.accId && e.accSearch) {
            let match = e.accSearch.match(/^(\d+)/);
            if (match) {
                let found = accs.find(x => x.code === match[1]);
                if (found && window.isLeafAcc(found.code)) {
                    e.accId = found.id;
                    e.isQty = found.isQty;
                    e.currency = found.currency;
                    e.unit = found.unit;
                }
            }
        }
    }

    let invalidAccs = voucherEntries.filter(e => !e.accId && e.accSearch && (Math.abs(+e.debit || 0) > 0.001 || Math.abs(+e.credit || 0) > 0.001));
    if (invalidAccs.length > 0) {
        return alert('凭证明细中存在未成功匹配的会计科目：【' + invalidAccs[0].accSearch + '】，请确认输入的科目代码有效且是末级科目！');
    }

    let va = voucherEntries.filter(e => e.accId && (Math.abs(+e.debit || 0) > 0.001 || Math.abs(+e.credit || 0) > 0.001));
    if (va.length < 2) return alert('至少需两行明细（包含有效科目和发生金额）');
    
    let td = va.reduce((s, e) => s + (+e.debit || 0), 0);
    let tc = va.reduce((s, e) => s + (+e.credit || 0), 0);
    if (Math.abs(td - tc) > 0.001 || Math.abs(td) < 0.001) return alert('借贷不平或完全为空');
    
    for (let a of va) {
        let m = a.accSearch.match(/^(\d+)/);
        if (m && window.isCashAcc(m[1]) && !a.cfItem) return alert('科目【' + a.accSearch + '】为货币资金科目，保存前必须强制为其指定现金流量表项目！');
        
        let acc = accs.find(x => x.id == a.accId);
        if (acc && acc.auxCategory) {
            if (!a.auxCat || !a.auxId) {
                return alert('科目【' + a.accSearch + '】关联了辅助核算，保存前必须完整选择具体的【辅助类别】和【子目】！');
            }
        }
    }
    
    let d = window.voucherDraftMeta.date || window.ge('vDate').value;
    let p = d.substring(0, 7);
    if ((await window.dbIdx('closings', 'bookId', curBook.id)).some(c => c.period === p)) return alert('已结账，无法保存当前期间凭证');
    
    let vid = editingVoucherId;
    if (vid) {
        let v = await window.dbGet('vouchers', vid);
        if (!v) return;
        v.date = d; v.period = p; 
        v.vno = (window.voucherDraftMeta.word || '记') + '-' + (window.qs('.vnum')?.textContent || v.vno.split('-')[1]);
        v.summary = va[0].summary || ''; v.totalDeb = td; v.totalCre = tc; 
        v.attach = +(window.voucherDraftMeta.attach || 0) || 0;
        await window.dbPut('vouchers', v);
        let os = await window.dbIdx('entries', 'voucherId', vid);
        for (let o of os) await window.dbDel('entries', o.id);
    } else {
        let vn = (window.voucherDraftMeta.word || '记') + '-' + String((await window.dbIdx('vouchers', 'bookId', curBook.id)).filter(x => x.period === p).length + 1).padStart(4, '0');
        vid = await window.dbAdd('vouchers', {bookId: curBook.id, period: p, vno: vn, date: d, status: '未审核', summary: va[0].summary || '', totalDeb: td, totalCre: tc, attach: +(window.voucherDraftMeta.attach || 0) || 0});
    }
    
    for (let a of va) {
        await window.dbAdd('entries', {bookId: curBook.id, voucherId: vid, accId: a.accId, summary: a.summary, deb: +a.debit || 0, cre: +a.credit || 0, auxId: a.auxId ? +a.auxId : null, cfItem: a.cfItem || null, currency: a.currency || null, fcAmount: +a.fcAmount || null, excRate: +a.excRate || null, qty: a.qty ? +a.qty : null, price: a.price ? +a.price : null});
    }
    
    alert('🎉 凭证保存成功！');
    editingVoucherId = null;
    window.pgVoucherAdd(true); // 强制清空表单并重置元数据
};

window.searchVoucherToEdit = async function() {
    let vs = (await window.dbIdx('vouchers', 'bookId', curBook.id)).filter(v => v.period === curPeriod).sort((a, b) => b.id - a.id);
    if (!vs.length) return alert('无凭证');
    window.openDlg('🔍 查询凭证', `<div class="mb-3"><select id="sEditV" class="sel" size="8" style="height:200px;">${vs.map(v => `<option value="${v.id}" ${v.status==='已审核'?'disabled style="color:#94a3b8"':''}>${v.vno} - ${window.esc(v.summary)} [${window.fa(v.totalDeb)}] ${v.status==='已审核'?'(已审)':''}</option>`).join('')}</select></div>`, async () => {
        let i = window.ge('sEditV').value;
        if (!i) return alert('请选择');
        window.closeDlg();
        window.loadVoucherForEdit(+i);
    });
};

window.loadVoucherForEdit = async function(id) {
    let v = await window.dbGet('vouchers', id);
    if (!v || v.status === '已审核') return alert('已审核，禁止修改');
    editingVoucherId = id;
    window._loadEditVoucherId = id; // 通知系统主动从数据库拉取
    window.goMenu('voucher-add', true);
};

    window.ge('pageEl').innerHTML = `
        <div class="card">
            <div class="flex-row mb-3 bg-body p-3 no-print" style="padding:12px;border-radius:8px;border:1px solid #cbd5e1;">

                <button onclick="window.reorderVouchers()" class="btn btn-i" ${isClosed?'disabled':''}>📑 整理断号</button>
                <button onclick="window.batchDelVouchers()" class="btn btn-d" ${isClosed?'disabled':''}>🗑️ 批量删除</button>

                        <tr><th class="tc">日期</th><th class="tc">字号</th><th class="tl">摘要</th><th class="tr">借方</th><th class="tr">贷方</th><th class="tc">状态</th><th class="tc">操作</th></tr>

window.loadVList = async function() {
    let p = window.ge('vlP')?.value || curPeriod;
    let kw = (window.ge('vlKw')?.value || '').toLowerCase();
    let st = window.ge('vlSt')?.value || '';
    let ls = (await window.dbIdx('vouchers', 'bookId', curBook.id)).filter(v => v.period === p && (st ? v.status === st : true) && (!kw || (v.summary || '').toLowerCase().includes(kw) || (v.vno || '').toLowerCase().includes(kw))).sort((a, b) => b.id - a.id);
    
    window.ge('vListBody').innerHTML = ls.length ? ls.map(v => `
        <tr>
            <td class="tc mono text-sm">${window.esc(v.date)}</td>
            <td class="tc bold color-p">${window.esc(v.vno)}</td>
            <td>${window.esc(v.summary)}</td>
            <td class="tr dr-val">${window.fa(v.totalDeb)}</td>
            <td class="tr cr-val">${window.fa(v.totalCre)}</td>
            <td class="tc"><span class="badge ${v.status==='已审核'?'green':'orange'}">${v.status}</span></td>
            <td class="tc">
                <button onclick="window.viewVoucher(${v.id})" class="btn btn-text text-xs">详情</button>
                ${v.status==='未审核' && !isClosed ? `<button onclick="window.loadVoucherForEdit(${v.id})" class="btn btn-text text-xs" style="color:#7c3aed;">修改</button><button onclick="window.auditV(${v.id},'已审核')" class="btn btn-text text-xs" style="color:var(--success);">审核</button>` : ''}
                ${v.status==='已审核' && !isClosed ? `<button onclick="window.auditV(${v.id},'未审核')" class="btn btn-text text-xs" style="color:var(--warning);">反审</button>` : ''}
                <button onclick="window.delVoucher(${v.id})" ${v.status==='已审核'||isClosed?'disabled':''} class="btn btn-text danger text-xs">删除</button>
            </td>
        </tr>`).join('') : '<tr><td colspan="7" class="tc color-m py-4">无数据</td></tr>';
};

window.auditV = async function(id, st) {
    let v = await window.dbGet('vouchers', id);
    if (v) { v.status = st; await window.dbPut('vouchers', v); window.loadVList(); }
};

window.delVoucher = async function(id) {
    if (!confirm('确认彻底删除该凭证？')) return;
    await window.dbDel('vouchers', id);
    let es = await window.dbIdx('entries', 'voucherId', id);
    for (let e of es) await window.dbDel('entries', e.id);
    window.loadVList();
};

window.batchAudit = async function(st) {
    let p = window.ge('vlP')?.value || curPeriod;
    if ((await window.dbIdx('closings', 'bookId', curBook.id)).some(c => c.period === p)) return alert('当前查询的期间已结账，无法进行操作！');
    
    let kw = (window.ge('vlKw')?.value || '').toLowerCase();
    let cst = window.ge('vlSt')?.value || '';
    let vs = (await window.dbIdx('vouchers', 'bookId', curBook.id)).filter(v => v.period === p && (cst ? v.status === cst : true) && (!kw || (v.summary || '').toLowerCase().includes(kw) || (v.vno || '').toLowerCase().includes(kw)));
    
    let tgVs = vs.filter(v => (st === '已审核' ? v.status === '未审核' : v.status === '已审核'));
    if (!tgVs.length) return alert(`查询结果中没有需要【${st==='已审核'?'审核':'反审'}】的凭证。`);
    
    if (!confirm(`确定批量将查出的 ${tgVs.length} 张凭证执行【${st==='已审核'?'审核':'反审'}】操作吗？`)) return;
    
    for (let v of tgVs) { v.status = st; await window.dbPut('vouchers', v); }
    window.loadVList();
    alert(`成功批量处理 ${tgVs.length} 张凭证！`);
};

window.reorderVouchers = async function() {
    let p = window.ge('vlP')?.value || curPeriod;
    if ((await window.dbIdx('closings', 'bookId', curBook.id)).some(c => c.period === p)) return alert('已结账，无法重排！');
    if (!confirm(`确定要按日期顺序重新编排本期 (${p}) 的凭证号吗？此操作不可逆！`)) return;
    
    let vs = (await window.dbIdx('vouchers', 'bookId', curBook.id)).filter(v => v.period === p).sort((a, b) => a.date.localeCompare(b.date) || a.id - b.id);
    let dict = {};
    for (let v of vs) {
        let m = v.vno.match(/^([^\d\-]+)/), w = m ? m[1] : '记';
        if (!dict[w]) dict[w] = [];
        dict[w].push(v);
    }
    
    for (let w in dict) {
        let list = dict[w];
        for (let i = 0; i < list.length; i++) {
            list[i].vno = `${w}-${String(i + 1).padStart(4, '0')}`;
            await window.dbPut('vouchers', list[i]);
        }
    }
    alert('凭证断号整理完成！');
    window.loadVList();
};

window.batchDelVouchers = async function() {
    let p = window.ge('vlP')?.value || curPeriod;
    if ((await window.dbIdx('closings', 'bookId', curBook.id)).some(c => c.period === p)) return alert('已结账，禁止删除！');
    
    let st = window.ge('vlSt')?.value || '';
    let kw = (window.ge('vlKw')?.value || '').toLowerCase();
    let vs = (await window.dbIdx('vouchers', 'bookId', curBook.id)).filter(v => v.period === p && v.status === '未审核' && (!kw || (v.summary || '').toLowerCase().includes(kw) || (v.vno || '').toLowerCase().includes(kw)));
    
    if (!vs.length) return alert('当前没有可删除的未审凭证。');
    if (!confirm(`确定彻底删除查出的 ${vs.length} 张未审核凭证吗？数据不可恢复！`)) return;
    
    for (let v of vs) {
        await window.dbDel('vouchers', v.id);
        let es = await window.dbIdx('entries', 'voucherId', v.id);
        for (let e of es) await window.dbDel('entries', e.id);
    }
    alert(`成功删除了 ${vs.length} 张凭证！`);
    window.loadVList();
};

window.importVouchersCSV = function(i) {
    let f = i.files[0]; if (!f) return;
    let r = new FileReader();
    r.onload = async e => {
        try {
            let ls = window.parseCSV(e.target.result);
            if (ls.length < 2) return;
            let h = ls[0];
            let iD = h.indexOf('日期'), iV = h.indexOf('凭证字号'), iS = h.indexOf('摘要'), iC = h.indexOf('科目编码');
            let iA = h.indexOf('辅助项目'), iCF = h.indexOf('现金流项目'), iQ = h.indexOf('数量'), iP = h.indexOf('单价');
            let iCur = h.indexOf('外币'), iFc = h.indexOf('原币金额'), iR = h.indexOf('汇率');
            let iDb = h.indexOf('借方金额'), iCr = h.indexOf('贷方金额');
            
            if (iD < 0 || iC < 0) { iD = 0; iV = 1; iS = 2; iC = 3; iA = 5; iQ = 6; iP = 7; iCur = 8; iFc = 9; iR = 10; iDb = 11; iCr = 12; }
            
            let gs = {};
            for (let j = 1; j < ls.length; j++) {
                let w = ls[j]; if (w.length < 5) continue;
                let d = w[iD]?.trim(), v = w[iV]?.trim(), c = w[iC]?.trim();
                if (!d || !v || !c) continue;
                
                let k = d + '_' + v;
                if (!gs[k]) gs[k] = {date: d, vno: v, es: []};
                
                let ac = accs.find(a => a.code === c);
                let axN = w[iA]?.trim();
                let ax = axN ? auxItems.find(x => x.name === axN || x.code === axN || `[${x.category}] ${x.name}` === axN || `[${x.category}] ${x.code} ${x.name}` === axN) : null;
                let cfC = null;
                
                if (iCF >= 0 && w[iCF]) {
                    let fnd = CF_ITEMS.find(x => x.name === w[iCF].trim() || x.code === w[iCF].trim());
                    if (fnd) cfC = fnd.code;
                }
                
                gs[k].es.push({
                    summary: w[iS] || '', accId: ac?.id, code: c, auxId: ax ? +ax.id : null, cfItem: cfC,
                    deb: +w[iDb] || 0, cre: +w[iCr] || 0, qty: iQ >= 0 ? +w[iQ] : null, price: iP >= 0 ? +w[iP] : null,
                    currency: iCur >= 0 ? w[iCur].trim() : '', fcAmount: iFc >= 0 ? +w[iFc] : null, excRate: iR >= 0 ? +w[iR] : null
                });
            }
            
            let sc = 0, ers = [];
            for (let k in gs) {
                let g = gs[k], p = g.date.substring(0, 7);
                if ((await window.dbIdx('closings', 'bookId', curBook.id)).some(c => c.period === p)) { ers.push(g.vno + ' 所在期间已结账'); continue; }
                
                let td = g.es.reduce((s, e) => s + e.deb, 0), tc = g.es.reduce((s, e) => s + e.cre, 0);
                if (Math.abs(td - tc) > 0.001 || Math.abs(td) < 0.001) { ers.push(g.vno + ' 借贷不平衡'); continue; }
                if (g.es.some(e => !e.accId)) { ers.push(g.vno + ' 存在无效科目编码'); continue; }
                
                let auxErr = false;
                for (let e of g.es) {
                    let ac = accs.find(x => x.id === e.accId);
                    if (ac && ac.auxCategory && !e.auxId) {
                        ers.push(g.vno + ` 科目[${ac.code}]需辅助核算但未匹配到对应的辅助项`);
                        auxErr = true; break;
                    }
                }
                if (auxErr) continue;
                
                let m = g.vno.match(/^([^\d\-]+)/), w = m ? m[1] : '记', av = await window.dbIdx('vouchers', 'bookId', curBook.id);
                let vn = w + '-' + String(av.filter(x => x.period === p).length + 1).padStart(4, '0');
                let vid = await window.dbAdd('vouchers', {bookId: curBook.id, period: p, vno: vn, date: g.date, status: '未审核', summary: g.es[0].summary, totalDeb: td, totalCre: tc, attach: 0});
                
                for (let x = 0; x < g.es.length; x++) await window.dbAdd('entries', {bookId: curBook.id, voucherId: vid, ...g.es[x]});
                sc++;
            }
            alert('导入操作完毕！成功导入 ' + sc + ' 张凭证。\n' + (ers.length ? '跳过的异常凭证:\n' + ers.slice(0, 8).join('\n') + (ers.length > 8 ? '\n...' : '') : ''));
            window.loadVList();
        } catch(err) { alert('CSV文件格式解析错误，请确保使用系统导出的标准模板。'); }
        i.value = '';
    };
    r.readAsText(f, 'UTF-8');
};

window.exportVoucherDetail = async function() {
    let p = window.ge('vlP')?.value || curPeriod;
    let vs = (await window.dbIdx('vouchers', 'bookId', curBook.id)).filter(v => v.period === p);
    let rs = [['日期', '凭证字号', '摘要', '科目编码', '科目名称', '辅助项目', '现金流项目', '数量', '单价', '外币', '原币金额', '汇率', '借方金额', '贷方金额', '状态']];
    for (let v of vs) {
        let es = await window.dbIdx('entries', 'voucherId', v.id);
        for (let e of es) {
            let a = accs.find(x => x.id == e.accId);
            rs.push([v.date, v.vno, e.summary || '', a?.code || '', a ? window.getAccPath(a.code) : '', e.auxId ? window.getAuxName(e.auxId) : '', e.cfItem ? window.getCFName(e.cfItem) : '', e.qty || '', e.price || '', e.currency || '', e.fcAmount || '', e.excRate || '', e.deb || 0, e.cre || 0, v.status]);
        }
    }
    window.exportAOA(rs, '凭证明细数据_' + p);
};
